spring.application.name=springai

# Do not commit real API keys. Set this environment variable before running:
# PowerShell: $env:OPENAI_API_KEY="sk-..."
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Chat model options.
# You can override these values with environment variables.
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${OPENAI_TEMPERATURE:0.7}
